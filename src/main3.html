<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>WebCodecs Video Playback from Data Channel</title>
</head>
<body>

<p>Please enter the offer provided to you by the sender application: </p>
<textarea cols="80" rows="25"></textarea>
<button>Submit</button>

<video id="video-element" muted style="image-rendering: pixelated;"></video>

<script>
    document.querySelector('textarea').value = String.raw`PASTE HERE`;

    document.querySelector('button').addEventListener('click', async () => {
        const offer = JSON.parse(document.querySelector('textarea').value);
        const pc = new RTCPeerConnection({
            bundlePolicy: 'max-bundle',
            iceServers: [
                { urls: "stun:stun.l.google.com:19302" },
                { urls: "stun:stun1.l.google.com:19302" },
                { urls: "stun:stun2.l.google.com:19302" }
            ]
        });

        pc.ondatachannel = ((evt) => {
            // console.log(evt)
            evt.channel.onmessage = (event) => {
                const rtpBuffer = event.data;
                console.log(rtpBuffer)
                if (rtpBuffer instanceof ArrayBuffer) {
                    handleRTPPacket(rtpBuffer);
                }
            };
        })
        pc.onicegatheringstatechange = () => {
            if (pc.iceGatheringState === 'complete') {
                const answer = pc.localDescription;
                let asd = JSON.stringify({ "type": answer.type, sdp: answer.sdp });
                document.querySelector('textarea').value = asd;
                document.querySelector('p').value = 'Please paste the answer in the sender application.';
                navigator.sendBeacon("test?a=" + btoa(JSON.stringify({ "type": answer.type, sdp: answer.sdp })));
            }
        };

        // pc.ontrack = (evt) => {
        //     console.log("Got track!", evt);
        //     const videoElement = document.getElementById('video-element');
        //     videoElement.srcObject = evt.streams[0];
        //     try {
        //         videoElement.play();
        //     } catch { console.log("Can't autoplay!"); }
        // };

        await pc.setRemoteDescription(offer);
        const answer = await pc.createAnswer();
        await pc.setLocalDescription(answer);
        window.pc_ = pc;
    });

    // Initialize WebCodecs VideoDecoder
    let videoDecoder;
    const width = 500;  // default width
    const height = 500;  // default height

    // Function to initialize WebCodecs decoder
    async function initDecoder() {
        videoDecoder = new VideoDecoder({
            output: handleDecodedFrame,
            error: (e) => console.error('Decoder error:', e),
        });

        const config = {
            codec: 'av01.0.15M.10',
            width: width,
            height: height,
            bitrate: 1000000, // Adjust based on your network
            framerate: 30, // Can adjust based on the stream's framerate
        };

        videoDecoder.configure(config);
    }

    // Handle RTP packet (assumes H.264 NAL units within RTP)
    function handleRTPPacket(rtpBuffer) {
        const data = new Uint8Array(rtpBuffer);
        let nalUnit = extractNALUnit(data);

        if (nalUnit) {
            // Decode H.264 NAL unit
            videoDecoder.decode(new VideoFrame(nalUnit));
        }
    }

    // This function would parse an RTP packet to extract the H.264 NAL units
    function extractNALUnit(rtpData) {
        // RTP packet processing logic to extract NAL units goes here
        // For simplicity, assuming the RTP packet is just the raw NAL unit
        // and skipping actual RTP header parsing here

        // This is a simplified assumption that the entire payload is a NAL unit
        return rtpData; // Return the raw data as NAL unit for now
    }

    // Handle decoded frames and render them
    function handleDecodedFrame(decodedFrame) {
        console.log('Decoded frame:', decodedFrame);

        const videoElement = document.getElementById('video-element');

        // Display the decoded frame directly to the <video> element
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = width;
        canvas.height = height;

        // Draw the decoded frame onto the canvas
        ctx.drawImage(decodedFrame, 0, 0, width, height);

        // Capture the canvas stream and feed it to the <video> element
        videoElement.srcObject = canvas.captureStream(30); // Capture at 30 FPS
        videoElement.play();

        decodedFrame.close(); // Release the frame after drawing it
    }

    // Start the WebCodecs decoder
    initDecoder();

</script>

</body>
</html>
