name: Build gamescope-webrtc

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    container:
      image: archlinux:latest

    env:
      BUILD_DIR: build

    steps:
      - name: Install dependencies (Arch)
        run: |
          pacman -Syu --noconfirm

          pacman -S --noconfirm \
            base-devel \
            cmake \
            ninja \
            git \
            pkgconf \
            libva \
            libva-utils \
            pipewire \
            openssl \
            nasm

            # These allow software and nvidia gpus without a extra driver, but require extra work.
            # if enabling these, may want to staticly compile x264 as its required .so file for ffmpeg
            # cuda is optional at runtime, like libav, so that would be a strict complied in fallback
            # but I dont really want to take on the 3 backends durring compile time, as that also requires
            # that we most likely compile `ffnvcodec-headers` from source here too (not really compiled)
            # x264
            # ffnvcodec-headers
            # nvidia-utils
            # cuda

      - name: Checkout repository (shallow + submodules)
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: recursive

      - name: Configure CMake
        run: |
          cmake -B $BUILD_DIR \
                -S . \
                -G Ninja \
                -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: |
          cmake --build $BUILD_DIR --parallel

      - name: Verify outputs
        run: |
          ls -lah $BUILD_DIR/src

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gamescope-webrtc-build
          path: |
            build/src/gamescope-webrtc
            build/src/libgamescope-webrtc-lib.so