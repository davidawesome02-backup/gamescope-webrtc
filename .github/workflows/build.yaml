name: Build gamescope-webrtc

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    container:
      image: archlinux:latest

    env:
      BUILD_DIR: build

    steps:
      - name: Install dependencies (Arch)
        run: |
          pacman -Syu --noconfirm

          pacman -S --noconfirm \
            base-devel \
            cmake \
            ninja \
            git \
            pkgconf \
            vulkan-devel \
            pipewire \
            openssl \
            nasm

      - name: Checkout repository (shallow + submodules)
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: recursive

      - name: Verify Vulkan (important debug step)
        run: |
          pkg-config --modversion vulkan
          pkg-config --cflags vulkan
          ls /usr/include/vulkan

      - name: Configure CMake
        run: |
          cmake -B $BUILD_DIR \
                -S . \
                -G Ninja \
                -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: |
          cmake --build $BUILD_DIR --parallel

      - name: Verify outputs
        run: |
          ls -lah $BUILD_DIR/src

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gamescope-webrtc-build
          path: |
            build/src/gamescope-webrtc
            build/src/libgamescope-webrtc-lib.so